name: Check product images in DB

on:
  push:
    branches:
      - 'claude/install-ui-ux-package-kXymP'

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://cqwvhfcrmboscivtwkog.supabase.co
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd3ZoZmNybWJvc2NpdnR3a29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNjExNDMsImV4cCI6MjA5NDczNzE0M30.PpXtRgYepIHc-W0Ux4tScV6DObWCcqJ2DzlLD-47_Ag

    steps:
      - name: Check products.image_url
        run: |
          echo "=== products.image_url for all active products ==="
          curl -s \
            "${SUPABASE_URL}/rest/v1/products?select=id,name,image_url&active=eq.true&order=id" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" | \
            node -e "
              const raw = require('fs').readFileSync('/dev/stdin','utf8').trim();
              let data;
              try { data = JSON.parse(raw); } catch(e) { console.log('ERROR:', raw.slice(0,300)); process.exit(1); }
              if (!Array.isArray(data)) { console.log('Unexpected:', JSON.stringify(data)); process.exit(1); }
              const isRealImg = u => u && u.startsWith('http') && !u.match(/\/products\/[^/]+\/?$/);
              const isPagePath = u => u && u.match(/^(https?:\/\/[^/]*)?\/products\/[^/]+\/?$/);
              data.forEach(p => {
                const flag = isRealImg(p.image_url) ? '✓ real image' : isPagePath(p.image_url) ? '✗ PAGE PATH' : '✗ empty';
                console.log(p.id, p.name.slice(0,40), '->', p.image_url || '(empty)', '[' + flag + ']');
              });
              console.log('');
              const real = data.filter(p => isRealImg(p.image_url));
              const page = data.filter(p => isPagePath(p.image_url));
              const empty = data.filter(p => !p.image_url || p.image_url === '');
              console.log('SUMMARY: real=' + real.length + ' page_paths=' + page.length + ' empty=' + empty.length + ' total=' + data.length);
            "

      - name: Test chatbot API returns real image for LC-027
        run: |
          echo "=== Testing chatbot API: ask for photo of pantalon anticolico nube ==="
          RESPONSE=$(curl -sL --max-time 60 -X POST \
            "https://lioncub.pe/api/chat/manychat" \
            -H "Content-Type: application/json" \
            -d '{"phone":"test_ci_img_001","message":"quiero ver una foto del pantalon anticolico nube","name":"Test CI"}')
          echo "Full response: $RESPONSE"
          echo "$RESPONSE" | node -e "
            const raw = require('fs').readFileSync('/dev/stdin','utf8').trim();
            if (!raw) { console.log('FAIL: empty response'); process.exit(1); }
            let r;
            try { r = JSON.parse(raw); } catch(e) { console.log('FAIL: non-JSON:', raw.slice(0,300)); process.exit(1); }
            const url = r.image_url || '';
            const isRealImg = url.startsWith('http') && !url.match(/\/products\/[^/]+\/?$/);
            if (isRealImg) {
              console.log('SUCCESS: bot returned real image URL:', url);
              process.exit(0);
            } else if (url) {
              console.log('FAIL: bot returned page URL instead of image:', url);
              process.exit(1);
            } else {
              console.log('INFO: no image_url in response (product may have no images or bot used catalog fallback)');
              console.log('bot_reply:', (r.response || '').slice(0, 200));
            }
          "

      - name: Check product_images gallery table (focus on LC-101/201/202/301/302)
        run: |
          echo "=== product_images gallery — all rows for LC-1xx/2xx/3xx ==="
          curl -s \
            "${SUPABASE_URL}/rest/v1/product_images?select=product_id,url,is_primary,sort_order&product_id=in.(LC-101,LC-201,LC-202,LC-301,LC-302)&order=product_id,sort_order" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" | \
            node -e "
              const raw = require('fs').readFileSync('/dev/stdin','utf8').trim();
              let data;
              try { data = JSON.parse(raw); } catch(e) { console.log('Cannot read product_images:', raw.slice(0,200)); process.exit(0); }
              if (!Array.isArray(data)) { console.log('Access denied or error:', JSON.stringify(data)); process.exit(0); }
              if (data.length === 0) { console.log('No gallery images for these products'); process.exit(0); }
              const isPagePath = u => u && u.match(/^(https?:\/\/[^/]*)?\/products\/[^/]+\/?$/);
              data.forEach(r => {
                const flag = isPagePath(r.url) ? '[PAGE PATH]' : '[real img]';
                console.log(r.product_id, flag, 'primary=' + r.is_primary, 'sort=' + r.sort_order, r.url.slice(0,120));
              });
            "

      - name: Test chatbot API for LC-101 (Body Esencial Premium)
        run: |
          echo "=== Testing chatbot API: LC-101 ==="
          RESPONSE=$(curl -sL --max-time 60 -X POST \
            "https://lioncub.pe/api/chat/manychat" \
            -H "Content-Type: application/json" \
            -d '{"phone":"test_ci_lc101","message":"quiero ver una foto del body esencial premium","name":"Test CI"}')
          echo "Full response: $RESPONSE"
          echo "$RESPONSE" | node -e "
            const r = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8').trim());
            const url = r.image_url || '';
            const isReal = url.startsWith('http') && !url.match(/\/products\/[^/]+\/?$/);
            console.log(isReal ? 'SUCCESS image_url: ' + url : url ? 'FAIL page_url: ' + url : 'INFO no image — bot: ' + (r.response||'').slice(0,150));
          " || true
